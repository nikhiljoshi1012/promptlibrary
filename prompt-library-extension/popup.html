<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Library</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="title-block">
        <h1>Prompt Library</h1>
        <p class="subtitle">Capture, refine, and deploy your best prompts.</p>
      </div>
    </header>
    
    <section class="add-prompt-section">
      <div class="section-header">
        <h2>Add New Prompt</h2>
        <button type="button" class="btn-secondary" id="togglePromptFormBtn">Add New Prompt</button>
      </div>
      <div class="draft-status" id="draftStatus" aria-live="polite">Autosave on</div>
      <form id="promptForm" class="collapsed">
        <div class="form-group">
          <div class="label-row">
            <label for="titleInput">Title *</label>
            <span class="char-count" id="titleCharCount">0/80</span>
          </div>
          <input type="text" id="titleInput" placeholder="Enter prompt title" required>
        </div>
        
        <div class="form-group">
          <div class="label-row">
            <label for="promptInput">Prompt Content *</label>
            <span class="char-count" id="promptCharCount">0/1200</span>
          </div>
          <textarea id="promptInput" placeholder="Enter your prompt" rows="4" required></textarea>
          <p class="field-hint">Tip: Use {brackets} to create variables for templates.</p>
        </div>
        
        <div class="form-group">
          <label for="tagsInput">Tags (comma-separated)</label>
          <input type="text" id="tagsInput" placeholder="e.g., coding, writing, analysis">
        </div>
        
        <div class="form-group">
          <label for="sourceUrlInput">Source URL (optional)</label>
          <input type="url" id="sourceUrlInput" placeholder="https://example.com">
        </div>

        <div class="form-group">
          <label for="bestUseCaseInput">When to use this (optional)</label>
          <input type="text" id="bestUseCaseInput" placeholder="e.g., Summarize financial reports">
        </div>

        <div class="form-group">
          <label for="recommendedModelInput">Recommended model (optional)</label>
          <input type="text" id="recommendedModelInput" placeholder="e.g., GPT-4, Claude 3">
        </div>

        <div class="form-group">
          <label for="limitationsInput">Limitations (optional)</label>
          <textarea id="limitationsInput" placeholder="e.g., Struggles with scanned PDFs" rows="2"></textarea>
        </div>
        
        <button type="submit" class="btn-primary">Save Prompt</button>
      </form>
    </section>
    
    <section class="search-section">
      <h2>Search Prompts</h2>
      <input type="text" id="searchInput" placeholder="Search by title or content...">
    </section>
    
    <section class="prompts-section">
      <h2>Your Prompts (<span id="promptCount">0</span>)</h2>
      <div id="promptsList"></div>
    </section>
  </div>
  
  <script src="popup.js"></script>

  <div id="usePromptModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">
        <span class="close-btn" id="closeUseModal">&times;</span>
        <h2 id="useModalTitle">Use Prompt</h2>
      </div>

      <div id="usePromptBody"></div>

      <div class="modal-actions">
        <button class="btn-secondary" id="useModalCopy">Copy</button>
        <button class="btn-primary" id="useModalInject">Inject</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
